# =================================================
# HMS Backend - application.properties
# =================================================
# Secrets are read from environment variables.
# Defaults here are for LOCAL DEVELOPMENT ONLY.
# In production, set the actual env vars — never commit real credentials.
# See .env.example for the full list of required variables.
# =================================================

# --- Server Configuration ---
server.port=${PORT:8080}

# --- MySQL Database Configuration ---
spring.datasource.url=jdbc:${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Configuration ---
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'update' creates/updates tables automatically. Switch to 'validate' in production.
spring.jpa.hibernate.ddl-auto=${HMS_DDL_AUTO:update}
# Show SQL in dev; override to false in production profile.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Application Name ---
spring.application.name=hms-backend

# --- SMTP Mail Configuration (Gmail over SSL/465) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${HMS_MAIL_USER}
spring.mail.password=${HMS_MAIL_PASSWORD}
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
# Timeouts (ms): fail fast instead of hanging 136s
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=${HMS_MAIL_DEBUG:false}

# --- JWT Secret ---
hms.jwt.secret=${HMS_JWT_SECRET}

# --- Frontend URL for activation links ---
hms.frontend.url=${HMS_FRONTEND_URL}

# --- Security: HTTPS enforcement (set to true in production behind nginx/reverse-proxy) ---
hms.require.https=false

# --- File Upload: Student Documents ---
hms.uploads.dir=${HMS_UPLOADS_DIR:./uploads/student-docs}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
